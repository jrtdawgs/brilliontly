<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#gBg)"/>
  <circle cx="50" cy="50" r="45" fill="#0f172a"/>

  <!-- Gator head -->
  <path d="M30 35 Q35 22 50 18 Q65 22 70 35 Q75 50 70 60 Q65 70 50 73 Q35 70 30 60 Q25 50 30 35Z" fill="url(#gBg)"/>

  <!-- Snout -->
  <path d="M35 30 Q40 20 50 17 Q60 20 65 30" fill="#16a34a" stroke="#15803d" stroke-width="0.5"/>

  <!-- Eyes -->
  <circle cx="38" cy="38" r="6" fill="#fbbf24"/>
  <circle cx="38" cy="38" r="3" fill="#0f172a"/>
  <circle cx="37" cy="37" r="1" fill="white"/>

  <circle cx="62" cy="38" r="6" fill="#fbbf24"/>
  <circle cx="62" cy="38" r="3" fill="#0f172a"/>
  <circle cx="61" cy="37" r="1" fill="white"/>

  <!-- Grin -->
  <path d="M37 55 Q50 64 63 55" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Teeth -->
  <path d="M40 55 L41.5 59 L43 55" fill="white"/>
  <path d="M47 56.5 L48.5 61 L50 56.5" fill="white"/>
  <path d="M54 56.5 L55.5 61 L57 56.5" fill="white"/>
  <path d="M60 55 L61.5 59 L63 55" fill="white"/>

  <!-- Crown -->
  <path d="M35 25 L38 14 L44 21 L50 8 L56 21 L62 14 L65 25Z" fill="url(#gGold)" stroke="#fbbf24" stroke-width="0.5"/>
  <circle cx="44" cy="18" r="1.5" fill="#22c55e"/>
  <circle cx="50" cy="12" r="1.5" fill="#ef4444"/>
  <circle cx="56" cy="18" r="1.5" fill="#3b82f6"/>

  <!-- Scales texture -->
  <circle cx="45" cy="46" r="1.5" fill="#15803d" opacity="0.4"/>
  <circle cx="55" cy="46" r="1.5" fill="#15803d" opacity="0.4"/>
  <circle cx="50" cy="50" r="1.5" fill="#15803d" opacity="0.4"/>
</svg>
