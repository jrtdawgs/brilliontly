<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gatorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="bearGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="5"/>

  <!-- Inner ring accent -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3"/>

  <!-- BULL (left) - stylized bull head -->
  <g transform="translate(55, 130)" fill="url(#goldGrad)" filter="url(#glow)">
    <!-- Bull head -->
    <ellipse cx="50" cy="70" rx="30" ry="35" opacity="0.9"/>
    <!-- Left horn -->
    <path d="M25 45 Q5 15 2 5 Q10 20 30 38" stroke="#fbbf24" stroke-width="3" fill="none"/>
    <!-- Right horn -->
    <path d="M75 45 Q95 15 98 5 Q90 20 70 38" stroke="#fbbf24" stroke-width="3" fill="none"/>
    <!-- Bull snout -->
    <ellipse cx="50" cy="85" rx="20" ry="12" fill="#d97706" opacity="0.7"/>
    <!-- Nostrils -->
    <circle cx="42" cy="85" r="3" fill="#0f172a"/>
    <circle cx="58" cy="85" r="3" fill="#0f172a"/>
    <!-- Eye -->
    <circle cx="40" cy="62" r="4" fill="#0f172a"/>
    <circle cx="40" cy="61" r="1.5" fill="#fbbf24"/>
    <!-- Bull pointing up arrow (bullish) -->
    <path d="M45 105 L50 95 L55 105" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- BIG BULL THE GATOR (center) - larger, prominent -->
  <g transform="translate(140, 100)" filter="url(#glow)">
    <!-- Gator body/head shape -->
    <path d="M60 30 Q90 15 110 30 Q120 45 115 65 Q110 80 90 90 Q70 95 50 90 Q30 80 25 65 Q20 45 35 30 Z" fill="url(#gatorGrad)"/>
    <!-- Snout -->
    <path d="M60 30 Q60 15 75 10 Q90 15 90 30" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
    <!-- Upper jaw ridges -->
    <path d="M62 25 Q75 18 88 25" fill="none" stroke="#0d9488" stroke-width="1.5"/>
    <!-- Eye left -->
    <circle cx="58" cy="40" r="8" fill="#fbbf24"/>
    <circle cx="58" cy="40" r="4" fill="#0f172a"/>
    <circle cx="56" cy="38" r="1.5" fill="#22c55e"/>
    <!-- Eye right -->
    <circle cx="92" cy="40" r="8" fill="#fbbf24"/>
    <circle cx="92" cy="40" r="4" fill="#0f172a"/>
    <circle cx="90" cy="38" r="1.5" fill="#22c55e"/>
    <!-- Gator grin/teeth -->
    <path d="M55 60 Q75 72 95 60" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Teeth -->
    <path d="M60 60 L62 66 L64 60" fill="white"/>
    <path d="M69 62 L71 68 L73 62" fill="white"/>
    <path d="M78 62 L80 68 L82 62" fill="white"/>
    <path d="M87 60 L89 66 L91 60" fill="white"/>
    <!-- Scales/texture -->
    <circle cx="70" cy="50" r="2" fill="#15803d" opacity="0.5"/>
    <circle cx="80" cy="48" r="2" fill="#15803d" opacity="0.5"/>
    <circle cx="75" cy="55" r="1.5" fill="#15803d" opacity="0.5"/>
    <!-- Crown (Big Bull is king) -->
    <path d="M55 22 L60 8 L68 18 L75 2 L82 18 L90 8 L95 22 Z" fill="url(#goldGrad)" stroke="#fbbf24" stroke-width="1"/>
    <!-- Crown jewels -->
    <circle cx="68" cy="15" r="2" fill="#22c55e"/>
    <circle cx="75" cy="8" r="2" fill="#ef4444"/>
    <circle cx="82" cy="15" r="2" fill="#3b82f6"/>
  </g>

  <!-- BEAR (right) - stylized bear head -->
  <g transform="translate(275, 130)" fill="url(#bearGrad)" filter="url(#glow)">
    <!-- Bear head -->
    <ellipse cx="50" cy="65" rx="35" ry="38"/>
    <!-- Left ear -->
    <circle cx="22" cy="35" r="14" fill="#dc2626"/>
    <circle cx="22" cy="35" r="8" fill="#7f1d1d"/>
    <!-- Right ear -->
    <circle cx="78" cy="35" r="14" fill="#dc2626"/>
    <circle cx="78" cy="35" r="8" fill="#7f1d1d"/>
    <!-- Snout -->
    <ellipse cx="50" cy="78" rx="18" ry="13" fill="#fca5a5" opacity="0.6"/>
    <!-- Nose -->
    <ellipse cx="50" cy="74" rx="7" ry="5" fill="#0f172a"/>
    <!-- Eye -->
    <circle cx="62" cy="58" r="4" fill="#0f172a"/>
    <circle cx="62" cy="57" r="1.5" fill="#ef4444"/>
    <!-- Bear mouth/growl -->
    <path d="M38 84 Q50 92 62 84" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <!-- Bear pointing down arrow (bearish) -->
    <path d="M45 100 L50 110 L55 100" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text: BRILLIONTLY -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="30" letter-spacing="4" fill="white">BRILLIONTLY</text>

  <!-- Tagline -->
  <text x="200" y="305" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" letter-spacing="3" fill="#22c55e" opacity="0.8">MAKE MILLIONS BRILLIANTLY</text>

  <!-- Bottom decorative line -->
  <line x1="120" y1="320" x2="280" y2="320" stroke="url(#ringGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Small chart line accent at bottom -->
  <polyline points="140,355 160,345 175,350 195,335 210,340 230,325 250,338 260,330" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
